
<div class="conteiner bg-light mt-5 pt-4 ps-3 ">
    <h2>Cadastro de Cliente</h2>
    <div class="row align-items-start">
        <div class="card col-sm-12 col-md-6 col-lg-6 col-xl-6 col-xxl-6 p-4 m-4">
            nome: <br><input type="text" [(ngModel)]="obj.nome"><br>
            email: <br><input type="email" [(ngModel)]="obj.email"><br>
            documento: <br><input type="text" [(ngModel)]="obj.documento"><br> 
            telefone: <br><input type="text" [(ngModel)]="obj.telefone"><br>
            endereço: <br> <textarea [(ngModel)]="obj.logradouro"></textarea><br>
            senha: <br><input type="password" [(ngModel)]="obj.senha"><br>
            data de nacimento: <br><input type="date" [(ngModel)]="obj.dataNascimento"><br> <br>
            <div class="d-flex align-self-center">
                <button (click)="gravar();" class="btn btn-outline-dark ">Gravar</button>
            </div>
        </div>
        <div class="col-auto align-self-center">
            <h4>{{mensagem}}</h4>

        </div>
    </div>

</div>
