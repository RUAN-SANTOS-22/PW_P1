<div class="container bg-light vh-100 mt-5 pt-4 ps-3 pb-4">
    <h2>Esqueci a Senha</h2>
    <p>Digite seu email para recuperar a senha.</p>
    
    <div class="row justify-content-center">
        <div class="card col-sm-10 col-md-8 col-lg-5 col-xl-5 col-xxl-5 p-4 m-4">
            <h4>{{mensagem}}</h4>
            email: 
            <input type="email" class="form-control mb-2" [(ngModel)]="email" placeholder="seu email cadastrado" />
            <br>
            <div class="d-flex align-self-center">
                <button class="btn btn-outline-dark" (click)="recuperar()">Recuperar</button>
            </div>
            <br>
            <a class="align-self-center" href="login">Voltar para o login</a>
        </div>
    </div>
</div>
