<div class="container py-5 mt-5 min-vh-100">
  <div class="card shadow">
    <div class="card-body">
      <div class="row">
        <div class="col-md-5 text-center">
          <img src="{{obj.nome}}.png" class="img-fluid" style="max-height: 300px;" onerror="this.src='logo.png'">
        </div>
        <div class="col-md-7">
          <h2>{{obj.nome}}</h2>
          <p class="text-muted">{{obj.descritivo}}</p>

          <div *ngIf="obj.promo < obj.valor" class="mt-3">
            <span class="text-decoration-line-through text-muted">De: R$ {{obj.valor | number:'1.2-2'}}</span><br>
            <span class="fs-2 text-success fw-bold">Por: R$ {{obj.promo | number:'1.2-2'}}</span>
          </div>
          <div *ngIf="obj.promo >= obj.valor" class="mt-3">
            <span class="fs-2 text-success fw-bold">R$ {{obj.valor | number:'1.2-2'}}</span>
          </div>
          <p class="mt-2">Quantidade disponível: <strong>{{obj.quantidade}}</strong></p>

          <div class="mt-4">
            <button *ngIf="obj.quantidade>0" class="btn btn-success btn-lg px-5" (click)="adicionarItemCesta(obj)">
              Comprar
            </button>
            <button *ngIf="obj.quantidade<=0" class="btn btn-secondary btn-lg px-5" disabled>
              Sem Estoque
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
