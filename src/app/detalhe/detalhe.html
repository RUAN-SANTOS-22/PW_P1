<div class="row">
    <div class="col-12 display-4">{{obj.nome}}</div>
    <div class="col-sm-12 col-md-6">
        <img src="produto_{{obj.codigo}}.jpg" class="card-img-top" width="150px"><br>
    </div>
    <div class="col-sm-12 col-md-6">
        {{obj.descritivo}}
        
        <div *ngIf="obj.promo < obj.valor; else precoNormal">
            de: <s>R$ {{obj.valor}}</s> <br>
            por: R$ {{obj.promo}}
        </div>
        <ng-template #precoNormal>
            R$ {{obj.valor}}
        </ng-template>
        <br>
        <div *ngIf="obj.quantidade > 0; else semEstoque">
            <button class="btn btn-outline-success" (click)="adicionarItemCesta(obj)">Comprar</button>
        </div>
        <ng-template #semEstoque>
            <b>Sem Estoque</b>
        </ng-template>
    </div>
</div>
