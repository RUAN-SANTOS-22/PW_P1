<!-- login.html -->
<div class="container bg-light vh-100 mt-5 pt-4 ps-3 pb-4">
    <h2>Login</h2>
    <p>Preencha os campos para fazer o login.</p>
    
    <h4>{{mensagem}}</h4>
    
    <div class="row">
        <div class="card col-sm-12 col-md-6 p-4">
            email: 
            <input type="email" class="form-control mb-2" [(ngModel)]="email" placeholder="seu email cadastrado" />
            <br>
            senha: 
            <input type="password" class="form-control mb-2" [(ngModel)]="senha" placeholder="sua senha" />
            <br>
            <div class="d-flex gap-3">
                <button class="btn btn-outline-dark" (click)="entrar()">Entrar</button>
                <a href="cadastro">cadastrar-se</a>
            </div>
        </div>
    </div>
</div>
