<div class="container d-flex justify-content-center align-items-center py-5 mt-5">
  <div class="row justify-content-center min-vh-100 w-100">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4 class="mb-0">Fale Conosco</h4>
        </div>
        <div class="card-body p-4">
          <div *ngIf="alerta" class="alert alert-success">{{alerta}}</div>

          <div class="mb-2">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" [(ngModel)]="obj.nome">
          </div>

          <div class="mb-2">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="obj.email">
          </div>

          <div class="mb-2">
            <label class="form-label">Assunto</label>
            <select class="form-select" [(ngModel)]="obj.assunto">
              <option>Duvidas com produtos</option>
              <option>Duvidas com pedidos</option>
              <option>Problemas gerais</option>
              <option>Criticas e sugestões</option>
            </select>
          </div>

          <div class="mb-2">
            <label class="form-label">Mensagem</label>
            <textarea class="form-control" rows="4" [(ngModel)]="obj.mensagem"></textarea>
          </div>

          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" [(ngModel)]="obj.copia">
            <label class="form-check-label">Receber cópia por email</label>
          </div>

          <button class="btn btn-success w-100" (click)="enviar()">Enviar</button>
        </div>
      </div>
    </div>
  </div>
</div>
