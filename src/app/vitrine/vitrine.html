<!-- Carrossel simples -->
<div class="container pt-5 mt-5">
  <div id="carrossel" class="carousel slide carousel-light" data-bs-ride="carousel">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carrossel" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#carrossel" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#carrossel" data-bs-slide-to="2"></button>
    </div>
    <div class="carousel-inner rounded-3">
      <div class="carousel-item active">
        <img src="frutaBanner.png" class="d-block w-100" style="height: 180px; object-fit: cover;"
          onerror="this.src='logo.png'">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
          <h5>Frutas Frescas</h5>
        </div>
      </div>
      <div class="carousel-item">
        <img src="descontoBanner.png" class="d-block w-100" style="height: 180px; object-fit: cover;"
          onerror="this.src='logo.png'">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
          <h5>Ofertas Especiais</h5>
        </div>
      </div>
      <div class="carousel-item">
        <img src="qualidadeBanner.png" class="d-block w-100" style="height: 180px; object-fit: cover;"
          onerror="this.src='logo.png'">
        <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
          <h5>Produtos de qualidade</h5>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carrossel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carrossel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>
</div>


<div class="container mt-4">
  <h2 class="text-center">Produtos</h2>
</div>

<div class="container mt-4">
  <div class="row g-3">
    <div *ngFor="let obj of lista" class="col-6 col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm">
        <div *ngIf="obj.promo < obj.valor"
          class="position-absolute top-0 start-0 bg-warning text-dark px-2 py-1 m-2 rounded small">
          -{{ ((obj.valor - obj.promo) / obj.valor * 100).toFixed(0) }}%
        </div>
        <img src="{{obj.nome}}.png" class="card-img-top p-3"
          style="height: 150px; object-fit: contain; cursor: pointer;" (click)="redirecionar(obj);"
          onerror="this.src='logo.png'">
        <div class="card-body text-center">
          <h6 class="card-title fw-bold">{{obj.nome}}</h6>
          <div *ngIf="obj.promo >= obj.valor" class="text-success fw-bold">
            R$ {{obj.valor | number:'1.2-2'}}
          </div>
          <div *ngIf="obj.promo < obj.valor">
            <span class="text-decoration-line-through text-muted small">R$ {{obj.valor | number:'1.2-2'}}</span>
            <span class="text-danger fw-bold ms-2">R$ {{obj.promo | number:'1.2-2'}}</span>
          </div>
          <button *ngIf="obj.quantidade>0" class="btn btn-sm btn-success w-100 mt-2" (click)="adicionarItemCesta(obj)">
            Comprar
          </button>
          <button *ngIf="obj.quantidade<=0" class="btn btn-sm btn-secondary w-100 mt-2" disabled>
            Esgotado
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
