<div class="container d-flex justify-content-center align-items-center py-5 mt-5">
  <div class="row justify-content-center min-vh-100 w-100">
    <div class="col-11 col-sm-10 col-md-8 col-lg-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4 class="mb-0">Cadastro de Cliente</h4>
        </div>
        <div class="card-body p-4">
          <div *ngIf="mensagem" class="alert alert-success">{{mensagem}}</div>

          <div class="mb-2">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" [(ngModel)]="obj.nome">
          </div>

          <div class="row">
            <div class="col-md-6 mb-2">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" [(ngModel)]="obj.email">
            </div>
            <div class="col-md-6 mb-2">
              <label class="form-label">Documento</label>
              <input type="text" class="form-control" [(ngModel)]="obj.documento">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-2">
              <label class="form-label">Telefone</label>
              <input type="text" class="form-control" [(ngModel)]="obj.telefone">
            </div>
            <div class="col-md-6 mb-2">
              <label class="form-label">Data Nasc.</label>
              <input type="date" class="form-control" [(ngModel)]="obj.dataNascimento">
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label">Endereço</label>
            <textarea class="form-control" rows="2" [(ngModel)]="obj.logradouro"></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" [(ngModel)]="obj.senha">
          </div>

          <button class="btn btn-success w-100" (click)="gravar()" [disabled]="carregando">
          <span *ngIf="carregando" class="spinner-border spinner-border-sm me-2"></span>
    {{ carregando ? 'Cadastrando...' : 'Cadastrar' }}
</button>
        </div>
      </div>
    </div>
  </div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="toastSucesso" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">
        Cadastro realizado com sucesso!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
</div>
