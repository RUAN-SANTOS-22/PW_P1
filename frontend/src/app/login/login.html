<div class="container d-flex justify-content-center  align-items-center py-5 mt-5">
  <div class="row justify-content-center min-vh-100 w-100">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5">
      <div class="card shadow">

        <div class="card-header bg-success text-center">
          <h4 class="text-white">Login</h4>
        </div>
        <div class="card-body p-4">
          <div *ngIf="mensagem" class="alert alert-warning">{{mensagem}}</div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="obj.email" placeholder="seu@email.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" [(ngModel)]="obj.senha" placeholder="*************">
          </div>

          <button class="btn btn-success w-50 mb-3 d-block mx-auto" (click)="entrar()">Entrar</button>

          <div class="text-center">
            <a href="cadastro" class="text-decoration-none me-3">Criar conta</a>
            <a href="esqueci-senha" class="text-decoration-none">Esqueci a senha</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
