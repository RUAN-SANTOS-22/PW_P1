<!-- cadastro-cliente.html -->
<div class="container bg-light mt-5 pt-4 ps-3 pb-4">
    <h2>Cadastro de Cliente</h2>
    
    <div class="row justify-content-center">
        <div class="card col-sm-10 col-md-6 col-lg-6 col-xl-6 col-xxl-6 p-4 m-4">
            <h4>{{mensagem}}</h4>
            nome: <br><input type="text" class="form-control mb-2" [(ngModel)]="obj.nome"><br>
            email: <br><input type="email" class="form-control mb-2" [(ngModel)]="obj.email"><br>
            documento: <br><input type="text" class="form-control mb-2" [(ngModel)]="obj.documento"><br> 
            telefone: <br><input type="text" class="form-control mb-2" [(ngModel)]="obj.telefone"><br>
            endereço: <br> <textarea class="form-control mb-2" [(ngModel)]="obj.logradouro"></textarea><br>
            senha: <br><input type="password" class="form-control mb-2" [(ngModel)]="obj.senha"><br>
            data de nascimento: <br><input type="date" class="form-control mb-2" [(ngModel)]="obj.dataNascimento"><br> <br>
            <div class="d-flex align-self-center">
                <button (click)="gravar();" class="btn btn-outline-dark">Gravar</button>
            </div>
        </div>
    </div>
</div>
