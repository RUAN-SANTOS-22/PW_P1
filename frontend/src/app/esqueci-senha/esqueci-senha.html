<!-- esqueci-senha.html -->
<div class="container d-flex justify-content-center align-items-center py-5 mt-5">
  <div class="row justify-content-center min-vh-100 w-100">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4 class="mb-0">Recuperar Senha</h4>
        </div>
        <div class="card-body p-4">
          <div *ngIf="mensagem" class="alert alert-info">{{mensagem}}</div>

        
          <div *ngIf="!emailValidado">
            <div class="mb-3">
              <label class="form-label">Email cadastrado</label>
              <input type="email" class="form-control" [(ngModel)]="email" placeholder="seu@email.com">
            </div>

            <button class="btn btn-success w-100 mb-3" (click)="verificarEmail()">Verificar</button>

            <div class="text-center">
              <a href="login" class="text-decoration-none">Voltar para o login</a>
            </div>
          </div>

          
          <div *ngIf="emailValidado">
            <div class="mb-3">
              <label class="form-label">Nova Senha</label>
              <input type="password" class="form-control" [(ngModel)]="novaSenha" placeholder="Digite a nova senha">
            </div>

            <div class="mb-3">
              <label class="form-label">Confirmar Nova Senha</label>
              <input type="password" class="form-control" [(ngModel)]="confirmarSenha" placeholder="Confirme a nova senha">
            </div>

            <button class="btn btn-success w-100 mb-3" (click)="atualizarSenha()">Atualizar Senha</button>

            <div class="text-center">
              <a href="login" class="text-decoration-none">Voltar para o login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
