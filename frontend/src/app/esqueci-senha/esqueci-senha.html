<!-- esqueci-senha.html -->
<div class="container d-flex justify-content-center align-items-center py-5 mt-5">
  <div class="row justify-content-center min-vh-100 w-100">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4 class="mb-0">Recuperar Senha</h4>
        </div>
        <div class="card-body p-4">
 
          <div class="mb-3">
            <label class="form-label">Email cadastrado</label>
            <input type="email" class="form-control" [(ngModel)]="email" placeholder="seu@email.com">
          </div>
 
          <button class="btn btn-success w-100 mb-3" (click)="verificarEmail()" [disabled]="carregando">
            <span *ngIf="carregando" class="spinner-border spinner-border-sm me-2"></span>
            {{ carregando ? 'Verificando...' : 'Verificar' }}
          </button>
 
          <div class="text-center">
            <a href="login" class="text-decoration-none">Voltar para o login</a>
          </div>
 
        </div>
      </div>
    </div>
  </div>
</div>
 
<!-- Toast container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
  <div id="toastSenhaSucesso" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">Se o e-mail existir, você receberá sua senha em breve!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
  <div id="toastSenhaErro" class="toast align-items-center text-bg-danger border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body">{{ mensagemToast }}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
